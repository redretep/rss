<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deutsche Hörspiele RSS Feeds</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --card-bg: #161616;
      --text: #ececec;
      --muted: #888888;
      --accent: #ffffff;
      --border: #222222;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-top: 2rem;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      margin-bottom: 0.5rem;
    }

    p.subtitle {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 400;
    }

    main {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .feed-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s ease;
    }

    .feed-card:hover {
      border-color: #444;
      transform: translateY(-2px);
    }

    .feed-info h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .feed-info span {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .rss-icon {
      width: 20px;
      height: 20px;
      fill: var(--muted);
      transition: fill 0.2s ease;
    }

    .feed-card:hover .rss-icon {
      fill: var(--accent);
    }

    footer {
      margin-top: 4rem;
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>redreteps rss feeds für deutsche hörspiele</h1>
    <p class="subtitle">Klassiker als RSS-Feed abonnieren.</p>
  </header>

  <main>
    <!-- Alf -->
    <a href="./alf/1.xml" class="feed-card">
      <div class="feed-info">
        <h2>ALF</h2>
        <span>Hörspiele</span>
      </div>
      <svg class="rss-icon" viewBox="0 0 24 24">
        <path d="M4 11a9 9 0 0 1 9 9h-3a6 6 0 0 0-6-6v-3m0 10.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3m0-16.5a15 15 0 0 1 15 15h-3a12 12 0 0 0-12-12v-3z"/>
      </svg>
    </a>

    <!-- Die drei ??? -->
    <a href="./diedreifragezeichen/1.xml" class="feed-card">
      <div class="feed-info">
        <h2>Die drei ???</h2>
        <span>Detektivgeschichten</span>
      </div>
      <svg class="rss-icon" viewBox="0 0 24 24">
        <path d="M4 11a9 9 0 0 1 9 9h-3a6 6 0 0 0-6-6v-3m0 10.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3m0-16.5a15 15 0 0 1 15 15h-3a12 12 0 0 0-12-12v-3z"/>
      </svg>
    </a>

    <!-- Harry Potter -->
    <a href="./harrypotter" class="feed-card">
      <div class="feed-info">
        <h2>Harry Potter</h2>
        <span>Gelesen von Rufus Beck</span>
      </div>
      <svg class="rss-icon" viewBox="0 0 24 24">
        <path d="M4 11a9 9 0 0 1 9 9h-3a6 6 0 0 0-6-6v-3m0 10.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3m0-16.5a15 15 0 0 1 15 15h-3a12 12 0 0 0-12-12v-3z"/>
      </svg>
    </a>
  </main>

  <footer>
    <p>Link kopieren und in deinen Podcast-Player einfügen.</p>
  </footer>

</body>
</html>
